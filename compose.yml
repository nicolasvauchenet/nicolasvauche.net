services:
  site:
    build: .
    container_name: nicolasvauche-site
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nicolasvauche.rule=Host(`nicolasvauche.fr`) || Host(`www.nicolasvauche.fr`)"
      - "traefik.http.routers.nicolasvauche.entrypoints=websecure"
      - "traefik.http.routers.nicolasvauche.tls=true"
      - "traefik.http.routers.nicolasvauche.tls.certresolver=letsencrypt"
      - "traefik.http.services.nicolasvauche.loadbalancer.server.port=80"
    networks:
      - web

networks:
  web:
    external: true
