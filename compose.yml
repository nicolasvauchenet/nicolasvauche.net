services:
  site:
    build: .
    container_name: nicolasvauche-site
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.nicolasvauche.rule=Host(`nicolasvauche.fr`)"
      - "traefik.http.routers.nicolasvauche.entrypoints=websecure"
      - "traefik.http.routers.nicolasvauche.tls=true"
      - "traefik.http.routers.nicolasvauche.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nicolasvauche.middlewares=site-compress@docker"

      - "traefik.http.routers.nicolasvauche-www.rule=Host(`www.nicolasvauche.fr`)"
      - "traefik.http.routers.nicolasvauche-www.entrypoints=websecure"
      - "traefik.http.routers.nicolasvauche-www.tls=true"
      - "traefik.http.routers.nicolasvauche-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nicolasvauche-www.middlewares=redirect-to-apex@docker"

      - "traefik.http.middlewares.redirect-to-apex.redirectregex.regex=^https://www\\.nicolasvauche\\.fr/(.*)"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.replacement=https://nicolasvauche.fr/$${1}"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.permanent=true"

      - "traefik.http.middlewares.site-compress.compress=true"

      - "traefik.http.services.nicolasvauche.loadbalancer.server.port=80"

    networks:
      - web

networks:
  web:
    external: true
