server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = / {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|webp|pdf|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
