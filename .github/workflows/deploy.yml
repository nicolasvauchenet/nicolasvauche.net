name: Deploy static site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SCW_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/scw_deploy
          chmod 600 ~/.ssh/scw_deploy
          ssh-keyscan -H "${{ secrets.SCW_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Validate private key
        run: |
          ssh-keygen -y -f ~/.ssh/scw_deploy > /dev/null

      - name: Ensure rsync is available
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Create remote app directory
        run: |
          ssh -i ~/.ssh/scw_deploy ${{ secrets.SCW_USER }}@${{ secrets.SCW_HOST }} \
            "mkdir -p /srv/apps/nicolasvauche"

      - name: Sync project files to server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh -i ~/.ssh/scw_deploy" \
            ./ ${{ secrets.SCW_USER }}@${{ secrets.SCW_HOST }}:/srv/apps/nicolasvauche/

      - name: Deploy on Scaleway
        run: |
          ssh -i ~/.ssh/scw_deploy ${{ secrets.SCW_USER }}@${{ secrets.SCW_HOST }} '
            cd /srv/apps/nicolasvauche &&
            docker compose up -d --build
          '
